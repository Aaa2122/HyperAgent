name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check agent tests llm_checks.py llm_schemas.py test_llm_layer.py
      - name: Format check
        run: python -m ruff format --check agent tests llm_checks.py llm_schemas.py test_llm_layer.py
      - name: Tests and coverage
        run: python -m pytest --cov=agent --cov-report=term-missing --cov-fail-under=70
      - name: Historical LLM contract checks
        run: python test_llm_layer.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: TypeScript typecheck
        run: npm run typecheck
      - name: Vite production build
        run: npm run build
